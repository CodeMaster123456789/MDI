<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamehub - Games Vergelijken</title>
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/compare.css" />
    <script src="../js/compare.js"></script>
  </head>
  <body>
    <header>
      <nav class="main-nav">
        <div class="nav-brand">
          <h1>🎮 Gamehub</h1>
        </div>
        <ul class="nav-menu">
          <li><a href="../index.html" class="nav-link">🏠 Home</a></li>
          <li><a href="games.html" class="nav-link">🎮 Games</a></li>
          <li><a href="collection.html" class="nav-link">📚 Mijn Collectie</a></li>
          <li><a href="guess.html" class="nav-link">🎯 Raad het Spel</a></li>
          <li><a href="compare.html" class="nav-link active">⚖️ Vergelijk</a></li>
        </ul>
        <button class="nav-toggle">☰</button>
      </nav>
    </header>
    <main>
      <section class="compare">
        <div class="part1">
          <div class="compare_title">
            <p id="logo">🎮</p>
            <h1>Game Vergelijken</h1>
            <p>Vergelijk twee videogames en ontdek welke beter scoort.</p>
          </div>
        </div>
        <div class="part2">
          <div class="name_game1">
            <form action="">
              <label for="name_game1">Selecteer Game 1</label>
              <input
                class="gameInput1"
                type="text"
                id="name_game1"
                name="name"
                list="gameList"
                placeholder="🔍 Zoek een game..."
              />
            </form>
          </div>
          <div class="name_game2">
            <form action="">
              <label for="name_game2">Selecteer Game 2</label>
              <input
                class="gameInput2"
                type="text"
                id="name_game2"
                name="name"
                list="gameList"
                placeholder="🔍 Zoek een game..."
              />
            </form>
          </div>
          <datalist id="gameList"></datalist>
          <div class="image_game1">
            <img class="image1" src="../image/development.jpeg" alt="development" />
          </div>
          <div class="image_game2">
            <img class="image2" src="../image/fifa.jpeg" alt="fifa" />
          </div>
          <div class="compare_specifications1">
            <ul></ul>
          </div>
          <div class="compare_specifications2">
            <ul></ul>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <p>2026 Gamehub — Alle rechten voorbehouden</p>
    </footer>
  </body>
</html>
