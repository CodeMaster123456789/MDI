<!doctype html>

<html lang="nl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gamehub - Games Vergelijken</title>

    <link rel="stylesheet" href="../css/general.css" />

    <link rel="stylesheet" href="../css/compare.css" />

    <link rel="stylesheet" href="../css/header.css" />

    <script src="../js/compare.js"></script>
  </head>

  <body>
    <header>
      <nav class="main-nav">
        <div class="nav-brand">
          <h1>🎮 Gamehub</h1>
        </div>

        <ul class="nav-menu">
          <li><a href="../index.html" class="nav-link">🏠 Home</a></li>
          <li><a href="games.html" class="nav-link">🎮 Games</a></li>
          <li>
            <a href="collection.html" class="nav-link">📚 Mijn Collectie</a>
          </li>
          <li><a href="guess.html" class="nav-link">🎯 Raad het Spel</a></li>
          <li>
            <a href="compare.html" class="nav-link active">⚖️ Vergelijk</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="compare">
        <div class="part1">
          <div class="compare_title">
            <p id="logo">🎮</p>

            <h1>Game Vergelijken</h1>

            <p>Vergelijk twee videogames en ontdek welke beter scoort.</p>
          </div>
        </div>

        <div class="part2">
          <div class="name_game1">
            <form action="">
              <label for="name">Selecteer Game 1</label>

              <input
                class="gameInput1"
                type="text"
                id="name"
                name="name"
                list="gameList"
                placeholder="🔍 Zoek een game..."
              />
            </form>
          </div>

          <div class="name_game2">
            <form action="">
              <label for="name">Selecteer Game 2</label>

              <input
                class="gameInput2"
                type="text"
                id="name"
                name="name"
                list="gameList"
                placeholder="🔍 Zoek een game..."
              />
            </form>
          </div>

          <datalist id="gameList"></datalist>

          <div class="image_game1">
            <img
              class="image1"
              src="https://media.rawg.io/media/games/20a/20aa03a10cda45239fe22d035c0ebe64.jpg"
              alt="development"
            />
          </div>

          <div class="image_game2">
            <img
              class="image2"
              src="https://media.rawg.io/media/games/490/49016e06ae2103881ff6373248843069.jpg"
              alt="fifa"
            />
          </div>

          <div class="compare_specifications1">
            <ul></ul>
          </div>

          <div class="compare_specifications2">
            <ul></ul>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
